<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GrowerLive · CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ─────────── Design tokens (GrowerLive) ─────────── */
:root {
  --gl-paper: #F3F6EF;
  --gl-paper-2: #F8FAF4;
  --gl-card: #FFFFFF;
  --gl-ink: #14241A;
  --gl-ink-2: #243528;
  --gl-mute: #6E7A6C;
  --gl-mute-2: #A1AC9E;
  --gl-line: #DCE3D2;
  --gl-line-2: #E7ECDF;

  --gl-green: #2DBE3E;
  --gl-green-soft: #7AD485;
  --gl-green-deep: #1F5F2E;
  --gl-green-wash: #E2F2DF;

  --gl-pos: #1F8A4E;
  --gl-neg: #B8442F;
  --gl-warn: #B58324;

  --gl-side: #122218;
  --gl-side-2: #19301E;
  --gl-side-ink: #E8EFE0;
  --gl-side-mute: #8A9788;
  --gl-side-line: #1F3624;

  --gl-serif: 'Fraunces', 'Source Serif Pro', Georgia, serif;
  --gl-sans: 'Inter Tight', -apple-system, system-ui, sans-serif;
  --gl-mono: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;

  --gl-r: 6px;
  --gl-r-lg: 10px;
  --gl-shadow: 0 1px 2px rgba(20, 36, 26, 0.04), 0 0 0 1px var(--gl-line);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--gl-sans);
  background: var(--gl-paper);
  color: var(--gl-ink);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; }

/* ─────────── App layout ─────────── */
.gl-app { display: grid; grid-template-columns: 232px 1fr; min-height: 100vh; min-width: 1200px; }
.gl-main { display: flex; flex-direction: column; min-width: 0; }
.gl-content { flex: 1; overflow-y: auto; }

/* ─────────── Sidebar ─────────── */
.gl-sidebar {
  background: var(--gl-side); color: var(--gl-side-ink);
  display: flex; flex-direction: column;
  padding: 22px 14px;
  border-right: 1px solid var(--gl-side-line);
  position: sticky; top: 0; height: 100vh;
}
.gl-brand {
  padding: 4px 6px 18px;
  border-bottom: 1px solid var(--gl-side-line);
  margin-bottom: 18px;
  display: flex; align-items: center; justify-content: center;
}
.gl-brand-logo { width: 100%; max-width: 180px; height: auto; object-fit: contain; display: block; }
.gl-nav { display: flex; flex-direction: column; gap: 1px; flex: 1; }
.gl-nav-section { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gl-side-mute); padding: 14px 10px 8px; }
.gl-nav-item {
  display: flex; align-items: center; gap: 11px;
  padding: 8px 10px; background: none; border: none;
  color: var(--gl-side-ink); font: inherit; font-size: 13px;
  text-align: left; border-radius: 5px; cursor: pointer;
  opacity: 0.78; transition: all 0.12s; white-space: nowrap; width: 100%;
}
.gl-nav-item:hover { background: var(--gl-side-2); opacity: 1; }
.gl-nav-item.is-active { background: var(--gl-side-2); opacity: 1; box-shadow: inset 2px 0 0 var(--gl-green); }
.gl-nav-icon { display: inline-block; width: 16px; text-align: center; color: var(--gl-side-mute); font-size: 12px; }
.gl-nav-item.is-active .gl-nav-icon { color: var(--gl-green); }

.gl-sidebar-foot { padding-top: 14px; border-top: 1px solid var(--gl-side-line); }
.gl-user {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 6px; background: none; border: none; font: inherit;
  text-align: left; width: 100%; cursor: pointer;
  border-radius: 6px; color: var(--gl-side-ink);
}
.gl-user:hover { background: var(--gl-side-2); }
.gl-user-name { font-size: 13px; }
.gl-user-role { font-size: 11px; color: var(--gl-side-mute); }
.gl-user-chev { color: var(--gl-side-mute); font-size: 11px; margin-left: auto; }

/* ─────────── Topbar ─────────── */
.gl-topbar {
  position: sticky; top: 0; z-index: 10;
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: 22px 40px 18px; background: var(--gl-paper);
  border-bottom: 1px solid var(--gl-line); gap: 24px;
}
.gl-breadcrumb { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gl-mute); display: flex; gap: 8px; margin-bottom: 6px; }
.gl-bc-sep { color: var(--gl-mute-2); }
.gl-bc-current { color: var(--gl-green-deep); font-weight: 500; }
.gl-page-title { font-family: var(--gl-serif); font-size: 34px; font-weight: 400; margin: 0; letter-spacing: -0.01em; line-height: 1; }
.gl-topbar-right { display: flex; gap: 10px; align-items: center; }

.gl-search { position: relative; display: flex; align-items: center; background: var(--gl-card); border: 1px solid var(--gl-line); border-radius: var(--gl-r); padding: 0 12px; width: 320px; height: 36px; }
.gl-search input { border: none; outline: none; background: none; font: inherit; flex: 1; padding: 0 8px; color: var(--gl-ink); }
.gl-search input::placeholder { color: var(--gl-mute-2); }
.gl-search-icon { color: var(--gl-mute); font-size: 14px; }
.gl-search-kbd { font-family: var(--gl-mono); font-size: 11px; color: var(--gl-mute); border: 1px solid var(--gl-line); border-radius: 3px; padding: 1px 5px; background: var(--gl-paper-2); }

/* ─────────── Buttons ─────────── */
.gl-btn { display: inline-flex; align-items: center; gap: 7px; font: inherit; font-size: 13px; font-weight: 500; padding: 8px 14px; height: 36px; border-radius: var(--gl-r); cursor: pointer; transition: all 0.12s; white-space: nowrap; border: 1px solid transparent; }
.gl-btn--primary { background: var(--gl-green-deep); color: #fff; border-color: var(--gl-green-deep); }
.gl-btn--primary:hover { background: #19481F; }
.gl-btn--primary:disabled { background: var(--gl-mute-2); border-color: var(--gl-mute-2); cursor: not-allowed; }
.gl-btn--accent { background: var(--gl-green); color: #07210C; border-color: var(--gl-green); }
.gl-btn--accent:hover { background: #28AB37; }
.gl-btn--ghost { background: var(--gl-card); color: var(--gl-ink); border-color: var(--gl-line); }
.gl-btn--ghost:hover { background: var(--gl-paper-2); border-color: var(--gl-mute-2); }
.gl-btn--danger { background: var(--gl-card); color: var(--gl-neg); border-color: var(--gl-line); }
.gl-btn--danger:hover { background: #FBEFEC; border-color: var(--gl-neg); }
.gl-btn--block { width: 100%; justify-content: center; }

.gl-icon-btn { width: 32px; height: 32px; border-radius: var(--gl-r); border: 1px solid var(--gl-line); background: var(--gl-card); cursor: pointer; font: inherit; color: var(--gl-mute); display: inline-flex; align-items: center; justify-content: center; }
.gl-icon-btn:hover { background: var(--gl-paper-2); color: var(--gl-ink); }

/* ─────────── Page ─────────── */
.gl-page { padding: 28px 40px 60px; display: flex; flex-direction: column; gap: 22px; }

/* ─────────── KPI row ─────────── */
.gl-kpi-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 1px; background: var(--gl-line); border: 1px solid var(--gl-line); border-radius: var(--gl-r-lg); overflow: hidden; }
.gl-kpi { background: var(--gl-card); padding: 22px 24px 20px; display: flex; flex-direction: column; gap: 10px; }
.gl-kpi--hero { background: var(--gl-paper-2); }
.gl-kpi-eyebrow { font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gl-mute); font-weight: 500; }
.gl-kpi-value { font-family: var(--gl-serif); font-size: 44px; line-height: 0.95; letter-spacing: -0.02em; color: var(--gl-ink); }
.gl-kpi-value--green { color: var(--gl-green-deep); }
.gl-kpi-foot { font-size: 12px; color: var(--gl-mute); display: flex; gap: 8px; align-items: center; }

/* ─────────── Cards ─────────── */
.gl-card { background: var(--gl-card); border: 1px solid var(--gl-line); border-radius: var(--gl-r-lg); padding: 22px; }
.gl-card--flush { padding: 0; overflow: hidden; }
.gl-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
.gl-card-eyebrow { font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gl-mute); font-weight: 500; }
.gl-card-title { font-family: var(--gl-serif); font-size: 22px; font-weight: 400; margin: 6px 0 0; letter-spacing: -0.005em; }
.gl-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
.gl-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 22px; }

/* ─────────── Tabs / segmented ─────────── */
.gl-tabs--underline { display: flex; gap: 0; border-bottom: 1px solid var(--gl-line); margin-bottom: 24px; }
.gl-tabs--underline .gl-tab { background: none; border: none; font: inherit; font-size: 13px; padding: 10px 4px; margin-right: 22px; border-bottom: 2px solid transparent; color: var(--gl-mute); cursor: pointer; }
.gl-tabs--underline .gl-tab.is-active { border-bottom-color: var(--gl-green); color: var(--gl-ink); font-weight: 500; }

.gl-segmented { display: inline-flex; background: var(--gl-card); border: 1px solid var(--gl-line); border-radius: var(--gl-r); padding: 2px; }
.gl-segmented button { background: none; border: none; font: inherit; font-size: 12.5px; padding: 6px 12px; border-radius: 4px; color: var(--gl-mute); cursor: pointer; }
.gl-segmented button.is-active { background: var(--gl-ink); color: #fff; }

/* ─────────── Empty states ─────────── */
.gl-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 72px 32px; text-align: center; border: 1px dashed var(--gl-line); border-radius: var(--gl-r-lg); background: var(--gl-paper-2); }
.gl-empty-icon { width: 56px; height: 56px; border-radius: 50%; display: grid; place-items: center; background: var(--gl-green-wash); color: var(--gl-green-deep); font-size: 22px; border: 1px solid #C6E2C2; }
.gl-empty-title { font-family: var(--gl-serif); font-size: 22px; font-weight: 400; letter-spacing: -0.005em; margin: 0; }
.gl-empty-sub { color: var(--gl-mute); font-size: 13px; max-width: 380px; line-height: 1.55; margin: 0; }
.gl-empty-actions { display: flex; gap: 10px; margin-top: 6px; }

/* ─────────── Kanban ─────────── */
.gl-kanban { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 12px; }
.gl-col { background: var(--gl-paper-2); border: 1px solid var(--gl-line); border-radius: var(--gl-r-lg); padding: 12px; display: flex; flex-direction: column; min-height: 480px; }
.gl-col-head { display: flex; justify-content: space-between; align-items: center; padding: 4px 4px 12px; border-bottom: 1px solid var(--gl-line); margin-bottom: 12px; }
.gl-col-title { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
.gl-col-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: 0.7; }
.gl-col-count { font-size: 11px; color: var(--gl-mute); background: var(--gl-card); padding: 1px 7px; border-radius: 100px; border: 1px solid var(--gl-line); font-family: var(--gl-mono); }
.gl-col-value { font-size: 11.5px; color: var(--gl-mute); margin-bottom: 8px; }
.gl-col-body { display: flex; flex-direction: column; gap: 8px; flex: 1; }
.gl-col-body--empty { align-items: center; justify-content: center; color: var(--gl-mute-2); font-size: 12px; }
.gl-col--prospect { color: #6B7568; }
.gl-col--discovery { color: #4F5B6E; }
.gl-col--pilot { color: var(--gl-green-deep); }
.gl-col--proposal { color: #6B4A2C; }
.gl-col--negotiation { color: var(--gl-warn); }
.gl-col--won { color: var(--gl-pos); }
.gl-col--lost { color: var(--gl-neg); }

.gl-deal-card { background: var(--gl-card); border: 1px solid var(--gl-line); border-radius: var(--gl-r); padding: 12px 12px 10px; cursor: pointer; transition: all 0.12s; color: var(--gl-ink); }
.gl-deal-card:hover { border-color: var(--gl-green-soft); box-shadow: 0 1px 3px rgba(20,36,26,0.06); }
.gl-deal-title { font-size: 13px; font-weight: 500; line-height: 1.35; margin-bottom: 4px; }
.gl-deal-account { font-size: 11.5px; color: var(--gl-mute); margin-bottom: 8px; }
.gl-deal-foot { display: flex; align-items: center; justify-content: space-between; }
.gl-deal-value { font-family: var(--gl-mono); font-size: 12px; font-weight: 500; color: var(--gl-ink); }

/* ─────────── Tables ─────────── */
.gl-table-wrap { background: var(--gl-card); border: 1px solid var(--gl-line); border-radius: var(--gl-r-lg); overflow: hidden; }
.gl-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.gl-table thead th { text-align: left; font-weight: 500; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gl-mute); padding: 12px 16px; border-bottom: 1px solid var(--gl-line); background: var(--gl-paper-2); white-space: nowrap; }
.gl-table tbody td { padding: 14px 16px; border-bottom: 1px solid var(--gl-line-2); }
.gl-table tbody tr:last-child td { border-bottom: none; }
.gl-table tbody tr.gl-row--click { cursor: pointer; }
.gl-table tbody tr.gl-row--click:hover { background: var(--gl-paper-2); }
.gl-table-empty { padding: 60px 20px; text-align: center; color: var(--gl-mute); }

/* ─────────── Toolbar ─────────── */
.gl-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.gl-toolbar-right { display: flex; gap: 8px; align-items: center; }

/* ─────────── Filter chips ─────────── */
.gl-chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
.gl-chip { background: var(--gl-card); border: 1px solid var(--gl-line); border-radius: 100px; padding: 5px 11px; font: inherit; font-size: 12px; color: var(--gl-mute); cursor: pointer; }
.gl-chip:hover { border-color: var(--gl-mute-2); color: var(--gl-ink); }
.gl-chip.is-active { background: var(--gl-ink); color: #fff; border-color: var(--gl-ink); }

/* ─────────── Section heading ─────────── */
.gl-section-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; }
.gl-section-h { font-family: var(--gl-serif); font-size: 24px; font-weight: 400; letter-spacing: -0.005em; margin: 0; }
.gl-section-sub { font-size: 12.5px; color: var(--gl-mute); margin-top: 4px; }

.gl-hint { display: inline-flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--gl-mute); }
.gl-hint::before { content: ""; width: 4px; height: 4px; border-radius: 50%; background: var(--gl-green); }

/* ─────────── Bars / charts ─────────── */
.gl-bars-vert { display: flex; flex-direction: column; gap: 14px; padding-top: 6px; }
.gl-vbar { display: flex; flex-direction: column; gap: 6px; }
.gl-vbar-head { display: flex; justify-content: space-between; align-items: baseline; font-size: 13px; }
.gl-vbar-track { height: 8px; background: var(--gl-paper-2); border-radius: 2px; border: 1px solid var(--gl-line); overflow: hidden; }
.gl-vbar-fill { height: 100%; background: linear-gradient(90deg, var(--gl-green-soft), var(--gl-green)); transition: width 0.3s; }

/* ─────────── Strip ─────────── */
.gl-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--gl-line); border: 1px solid var(--gl-line); border-radius: var(--gl-r-lg); overflow: hidden; }
.gl-strip > div { background: var(--gl-paper-2); padding: 14px 18px; display: flex; flex-direction: column; gap: 4px; }
.gl-strip-label { font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gl-mute); font-weight: 500; }
.gl-strip-value { font-family: var(--gl-serif); font-size: 22px; letter-spacing: -0.01em; color: var(--gl-ink); }
.gl-strip-value--mute { color: var(--gl-mute-2); }

/* ─────────── Avatar / badges ─────────── */
.gl-avatar { display: inline-grid; place-items: center; width: 28px; height: 28px; border-radius: 50%; background: var(--gl-paper); border: 1px solid var(--gl-line); color: var(--gl-ink); font-size: 11px; font-weight: 600; letter-spacing: 0.04em; }
.gl-avatar--green { background: linear-gradient(135deg, var(--gl-green-soft), var(--gl-green)); color: #07210C; border-color: var(--gl-green-deep); }

.gl-badge { display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 500; background: var(--gl-paper-2); color: var(--gl-mute); border: 1px solid var(--gl-line); }
.gl-badge--green { background: var(--gl-green-wash); color: var(--gl-green-deep); border-color: #C6E2C2; }
.gl-badge--warn { background: #F6E9CC; color: var(--gl-warn); border-color: #E8D29A; }
.gl-badge--red { background: #FBEFEC; color: var(--gl-neg); border-color: #ECD0CB; }

/* ─────────── Icon util ─────────── */
.gl-icn { width: 14px; height: 14px; stroke-width: 1.8; }
.gl-icn-lg { width: 18px; height: 18px; stroke-width: 1.7; }
.gl-divider { height: 1px; background: var(--gl-line); margin: 8px 0; }
.gl-spacer { flex: 1; }

/* ─────────── Login screen ─────────── */
.gl-login { min-height: 100vh; display: grid; place-items: center; background: var(--gl-side); background-image: radial-gradient(at 30% 20%, rgba(45,190,62,0.15) 0%, transparent 60%), radial-gradient(at 80% 80%, rgba(45,190,62,0.10) 0%, transparent 50%); padding: 24px; }
.gl-login-card { background: var(--gl-card); border-radius: 14px; padding: 36px 32px 28px; width: 100%; max-width: 380px; box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
.gl-login-logo { display: flex; justify-content: center; margin-bottom: 8px; }
.gl-login-logo img { width: 56px; height: 56px; object-fit: contain; }
.gl-login-wordmark { font-family: var(--gl-serif); font-size: 24px; text-align: center; color: var(--gl-green-deep); margin-bottom: 22px; letter-spacing: -0.01em; }
.gl-login-title { font-family: var(--gl-serif); font-size: 24px; font-weight: 400; margin: 0 0 4px; text-align: center; }
.gl-login-sub { color: var(--gl-mute); font-size: 13px; text-align: center; margin: 0 0 24px; }
.gl-login-form { display: flex; flex-direction: column; gap: 14px; }
.gl-field { display: flex; flex-direction: column; gap: 6px; }
.gl-field label { font-size: 12px; font-weight: 500; color: var(--gl-ink-2); }
.gl-input { font: inherit; font-size: 14px; padding: 10px 12px; border: 1px solid var(--gl-line); border-radius: var(--gl-r); background: var(--gl-card); color: var(--gl-ink); outline: none; transition: border-color 0.12s; }
.gl-input:focus { border-color: var(--gl-green); box-shadow: 0 0 0 3px rgba(45,190,62,0.12); }
.gl-input--textarea { min-height: 80px; resize: vertical; font-family: inherit; }
.gl-input--select { appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%236E7A6C' d='M6 7L0 1l1.4-1.4L6 4.2 10.6-.4 12 1z'/></svg>"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 32px; }
.gl-login-error { background: #FBEFEC; color: var(--gl-neg); padding: 8px 12px; border-radius: var(--gl-r); font-size: 12.5px; border: 1px solid #ECD0CB; }
.gl-login-submit { margin-top: 4px; }
.gl-login-foot { text-align: center; font-size: 11.5px; color: var(--gl-mute); margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--gl-line); }

/* ─────────── Loading screen ─────────── */
.gl-loading { min-height: 100vh; display: grid; place-items: center; background: var(--gl-paper); }
.gl-loading-inner { text-align: center; }
.gl-loading-logo { width: 64px; height: 64px; opacity: 0.9; margin-bottom: 16px; animation: gl-pulse 1.5s ease-in-out infinite; }
@keyframes gl-pulse { 0%,100% { opacity: 0.55; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }
.gl-loading-text { color: var(--gl-mute); font-size: 13px; }

/* ─────────── Modal ─────────── */
.gl-modal-backdrop { position: fixed; inset: 0; background: rgba(20,36,26,0.45); z-index: 100; display: flex; align-items: flex-start; justify-content: center; padding: 60px 20px; overflow-y: auto; }
.gl-modal { background: var(--gl-card); border-radius: 12px; width: 100%; max-width: 520px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); }
.gl-modal-head { padding: 20px 24px 14px; border-bottom: 1px solid var(--gl-line); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.gl-modal-title { font-family: var(--gl-serif); font-size: 22px; font-weight: 400; margin: 0; }
.gl-modal-sub { font-size: 12.5px; color: var(--gl-mute); margin: 4px 0 0; }
.gl-modal-close { background: none; border: none; cursor: pointer; color: var(--gl-mute); font-size: 22px; line-height: 1; padding: 4px; }
.gl-modal-body { padding: 18px 24px; display: flex; flex-direction: column; gap: 14px; max-height: 65vh; overflow-y: auto; }
.gl-modal-foot { padding: 14px 24px 18px; display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid var(--gl-line); }

.gl-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ─────────── Toast ─────────── */
.gl-toast { position: fixed; bottom: 24px; right: 24px; background: var(--gl-ink); color: #fff; padding: 12px 18px; border-radius: var(--gl-r-lg); font-size: 13px; box-shadow: 0 8px 24px rgba(0,0,0,0.25); z-index: 200; max-width: 340px; }
.gl-toast--err { background: var(--gl-neg); }

/* ─────────── Contact detail / Activity ─────────── */
.gl-activity-list { display: flex; flex-direction: column; gap: 12px; }
.gl-activity-item { display: flex; gap: 14px; padding: 14px 16px; background: var(--gl-card); border: 1px solid var(--gl-line); border-radius: var(--gl-r); }
.gl-activity-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gl-green); margin-top: 6px; flex-shrink: 0; }
.gl-activity-body { flex: 1; min-width: 0; }
.gl-activity-head { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 4px; }
.gl-activity-type { font-weight: 500; font-size: 13px; text-transform: capitalize; }
.gl-activity-time { font-size: 11.5px; color: var(--gl-mute); white-space: nowrap; }
.gl-activity-subject { font-size: 13px; color: var(--gl-ink); margin-bottom: 2px; }
.gl-activity-summary { font-size: 12.5px; color: var(--gl-mute); line-height: 1.5; }
.gl-activity-meta { font-size: 11.5px; color: var(--gl-mute); margin-top: 6px; }

/* ─────────── Stub screens ─────────── */
.gl-stub-screen { padding: 100px 40px; text-align: center; }
.gl-stub-screen .gl-empty-icon { margin: 0 auto 14px; width: 64px; height: 64px; }

/* Misc */
.gl-link { background: none; border: none; cursor: pointer; color: var(--gl-green-deep); font: inherit; font-size: 12.5px; text-decoration: underline; padding: 0; }
.gl-link:hover { color: var(--gl-green); }

.gl-stage-pill { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.gl-stage--prospect { background: #EDEFEC; color: #5A6557; }
.gl-stage--discovery { background: #E4E9F0; color: #4F5B6E; }
.gl-stage--pilot { background: var(--gl-green-wash); color: var(--gl-green-deep); }
.gl-stage--proposal { background: #F1E4D0; color: #6B4A2C; }
.gl-stage--negotiation { background: #F6E9CC; color: var(--gl-warn); }
.gl-stage--won { background: var(--gl-green-wash); color: var(--gl-pos); }
.gl-stage--lost { background: #FBEFEC; color: var(--gl-neg); }
</style>
</head>

/* ─────────── Toast ─────────── */
let __toastSet = null;
function showToast(msg, kind) {
  if (__toastSet) __toastSet({ msg, kind, id: Math.random() });
}
function ToastHost() {
  const [t, setT] = useState(null);
  useEffect(() => { __toastSet = setT; return () => { __toastSet = null; }; }, []);
  useEffect(() => {
    if (!t) return;
    const id = t.id;
    const h = setTimeout(() => setT(prev => prev && prev.id === id ? null : prev), 3500);
    return () => clearTimeout(h);
  }, [t]);
  if (!t) return null;
  return <div className={"gl-toast" + (t.kind === "err" ? " gl-toast--err" : "")}>{t.msg}</div>;
}

function LoginScreen({ onAuthed }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const submit = async (e) => {
    e.preventDefault();
    setLoading(true);
    setError(null);
    try {
      await signIn(email, password);
      onAuthed();
    } catch (err) {
      setError(err.message || "Login failed.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="gl-login">
      <div className="gl-login-card">
        <div className="gl-login-logo">
          <img src={window.__resources.logoLeaf} alt="GrowerLive" />

        <h1 className="gl-login-title">Sign in</h1>
        <p className="gl-login-sub">Precision farming sales · GrowerLive team</p>

        <form className="gl-login-form" onSubmit={submit}>
          <div className="gl-field">
            <label>Email</label>
            <input className="gl-input" type="email" required autoFocus
              value={email} onChange={(e) => setEmail(e.target.value)} />
          </div>
          <div className="gl-field">
            <label>Password</label>
            <input className="gl-input" type="password" required
              value={password} onChange={(e) => setPassword(e.target.value)} />
          </div>
          {error && <div className="gl-login-error">{error}</div>}
          <button className="gl-btn gl-btn--primary gl-btn--block gl-login-submit" type="submit" disabled={loading}>
            {loading ? "Signing in…" : "Sign in"}

        </form>

        <div className="gl-login-foot">

        </div>

/* ─────────── Modal shell ─────────── */
function Modal({ open, onClose, title, sub, children, footer, width }) {
  useEffect(() => {
    if (!open) return;
    const h = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", h);
    return () => document.removeEventListener("keydown", h);
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div className="gl-modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="gl-modal" style={width ? { maxWidth: width } : {}}>
        <div className="gl-modal-head">
          <div>
            <h2 className="gl-modal-title">{title}</h2>
            {sub && <p className="gl-modal-sub">{sub}</p>}
          </div>
          <button className="gl-modal-close" onClick={onClose} aria-label="Close"><Icn d={ICONS.close} size={18} /></button>
        </div>
        <div className="gl-modal-body">{children}</div>
        {footer && <div className="gl-modal-foot">{footer}</div>}
      </div>
    </div>
  );
}

/* ─────────── New Account modal ─────────── */
function NewAccountModal({ open, onClose, currentUser, onSaved, account }) {
  const editing = !!account;
  const [name, setName] = useState("");
  const [industry, setIndustry] = useState("");
  const [hq, setHq] = useState("");
  const [size, setSize] = useState("");
  const [website, setWebsite] = useState("");
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState(null);

  useEffect(() => {
    if (open) {
      setName(account?.name || "");
      setIndustry(account?.industry || "");
      setHq(account?.hq || "");
      setSize(account?.size || "");
      setWebsite(account?.website || "");
      setErr(null);
    }
  }, [open, account]);

  const submit = async (e) => {
    e.preventDefault();
    setSaving(true); setErr(null);
    try {
      const payload = { name, industry: industry || null, hq: hq || null, size: size || null, website: website || null, owner_id: currentUser?.id || null };
      const q = editing ? sb.from("accounts").update(payload).eq("id", account.id) : sb.from("accounts").insert(payload);
      const { error } = await q;
      if (error) throw error;
      showToast(editing ? "Grower updated" : "Grower added");
      onSaved();
      onClose();
    } catch (e) { setErr(e.message); }
    finally { setSaving(false); }
  };

  return (
    <Modal open={open} onClose={onClose} title={editing ? "Edit grower" : "New grower"} sub={editing ? null : "Add a farm or operation to track deals against."}
      footer={
        <>
          <button className="gl-btn gl-btn--ghost" onClick={onClose}>Cancel</button>
          <button className="gl-btn gl-btn--primary" onClick={submit} disabled={saving || !name.trim()}>{saving ? "Saving…" : (editing ? "Save changes" : "Create grower")}</button>
        </>
      }>
      <form onSubmit={submit} style={{ display: "contents" }}>
        <div className="gl-field"><label>Operation name *</label><input className="gl-input" required value={name} onChange={(e) => setName(e.target.value)} autoFocus placeholder="e.g. Diamond Valley Farms" /></div>
        <div className="gl-field-row">
          <div className="gl-field"><label>Operation type</label><input className="gl-input" value={industry} onChange={(e) => setIndustry(e.target.value)} placeholder="Greenhouse · Nursery · Sod · Broker · Retail" /></div>
          <div className="gl-field"><label>Location</label><input className="gl-input" value={hq} onChange={(e) => setHq(e.target.value)} placeholder="e.g. Salinas, CA" /></div>
        </div>
        <div className="gl-field-row">
          <div className="gl-field"><label>Size / scale</label><input className="gl-input" value={size} onChange={(e) => setSize(e.target.value)} placeholder="e.g. 200 acres · 12 stores · 5M units/yr" /></div>
          <div className="gl-field"><label>Website</label><input className="gl-input" value={website} onChange={(e) => setWebsite(e.target.value)} placeholder="example.com" /></div>
        </div>
        {err && <div className="gl-login-error">{err}</div>}
        <button type="submit" style={{ display: "none" }} />
      </form>
    </Modal>
  );
}

/* ─────────── New Opp modal ─────────── */

  const [accountId, setAccountId] = useState("");
  const [contactId, setContactId] = useState("");
  const [value, setValue] = useState("");
  const [stage, setStage] = useState("prospect");
  const [closeDate, setCloseDate] = useState("");
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState(null);
  useEffect(() => {
    if (open) {
      setTitle(""); setValue(""); setStage("prospect"); setCloseDate(""); setErr(null);
      if (prefillContactId) {
        setContactId(prefillContactId);
        const c = scenario.contacts.find(c => c.id === prefillContactId);
        setAccountId(c?.account_id || "");
      } else { setContactId(""); setAccountId(""); }
    }
  }, [open, prefillContactId, scenario]);

  const submit = async (e) => {
    e.preventDefault();
    setSaving(true); setErr(null);
    try {
      const cents = Math.round(parseFloat(value || "0") * 100);
      const { error } = await sb.from("opportunities").insert({
        title, account_id: accountId || null, contact_id: contactId || null,
        value_cents: cents, stage, expected_close: closeDate || null,
        owner_id: currentUser?.id || null,

      if (error) throw error;
      showToast("Deal created");
      onSaved(); onClose();
    } catch (e) { setErr(e.message); }
    finally { setSaving(false); }

  return (
    <Modal open={open} onClose={onClose} title="New deal" sub="Track a sales opportunity through your pipeline."
      footer={
        <>
          <button className="gl-btn gl-btn--ghost" onClick={onClose}>Cancel</button>

        <div className="gl-field"><label>Contact</label>

/* ─────────── Dashboard ─────────── */
function Dashboard({ scenario, currentUser, onLogCall, onAddOpp, onOpenContact }) {
  const opens = scenario.opps.filter(o => o.stage !== "won" && o.stage !== "lost");
  const won = scenario.opps.filter(o => o.stage === "won");
  const wonOrLost = scenario.opps.filter(o => o.stage === "won" || o.stage === "lost");
  const pipeValue = opens.reduce((a, o) => a + (o.value_cents || 0), 0);
  const wonValue = won.reduce((a, o) => a + (o.value_cents || 0), 0);
  const winRate = wonOrLost.length ? Math.round((won.length / wonOrLost.length) * 100) : null;
  const avgDeal = won.length ? wonValue / won.length : null;

  const stageBuckets = STAGES.filter(s => s.id !== "lost").map(s => ({
    ...s,
    count: scenario.opps.filter(o => o.stage === s.id).length,
    value: scenario.opps.filter(o => o.stage === s.id).reduce((a, o) => a + (o.value_cents || 0), 0),
  }));
  const maxStageVal = Math.max(1, ...stageBuckets.map(s => s.value));

  const recentActs = scenario.activities.slice(0, 8);

  return (
    <div className="gl-page" data-screen-label="Dashboard">
      <div className="gl-kpi-row">
        <div className="gl-kpi gl-kpi--hero">
          <div className="gl-kpi-eyebrow">Pipeline value</div>
          <div className="gl-kpi-value gl-kpi-value--green">{pipeValue ? fmtMoney(pipeValue) : "—"}</div>
          <div className="gl-kpi-foot">{opens.length} open deals</div>
        </div>
        <div className="gl-kpi">
          <div className="gl-kpi-eyebrow">Won this quarter</div>
          <div className="gl-kpi-value">{wonValue ? fmtMoney(wonValue) : "—"}</div>
          <div className="gl-kpi-foot">{won.length} deals</div>
        </div>
        <div className="gl-kpi">
          <div className="gl-kpi-eyebrow">Win rate (90d)</div>
          <div className="gl-kpi-value">{winRate !== null ? winRate + "%" : "—"}</div>
          <div className="gl-kpi-foot">{wonOrLost.length} closed</div>
        </div>
        <div className="gl-kpi">
          <div className="gl-kpi-eyebrow">Avg deal size</div>
          <div className="gl-kpi-value">{avgDeal ? fmtMoney(avgDeal) : "—"}</div>
          <div className="gl-kpi-foot">Closed-won</div>
        </div>
      </div>

      <div className="gl-grid-2">
        <section className="gl-card">

/* ─────────── Pipeline ─────────── */
function Pipeline({ scenario, onAddOpp, onOpenOpp, search }) {
  const cols = STAGES.filter(s => s.id !== "lost");
  const matches = (o) => {
    if (!search) return true;
    const s = search.toLowerCase();
    const acc = scenario.accounts.find(a => a.id === o.account_id);
    return (o.title || "").toLowerCase().includes(s) || (acc?.name || "").toLowerCase().includes(s);
  };
  return (
    <div className="gl-page" data-screen-label="Pipeline">
      <div className="gl-toolbar">
        <div className="gl-chip-row">
          <button className="gl-chip is-active">All deals</button>
        </div>
        <div className="gl-toolbar-right">
          <span className="gl-hint">{scenario.opps.filter(o => o.stage !== "won" && o.stage !== "lost").length} open · {fmtMoney(scenario.opps.filter(o => o.stage !== "won" && o.stage !== "lost").reduce((a, o) => a + (o.value_cents || 0), 0))}</span>
        </div>
      </div>

      <div className="gl-kanban">
        {cols.map(c => {
          const items = scenario.opps.filter(o => o.stage === c.id && matches(o));
          const total = items.reduce((a, o) => a + (o.value_cents || 0), 0);
          return (
            <div key={c.id} className={"gl-col gl-col--" + c.id}>
              <div className="gl-col-head">
                <div className="gl-col-title"><span className="gl-col-dot" /> {c.label}</div>
                <span className="gl-col-count">{items.length}</span>
              </div>
              <div className="gl-col-value">{fmtMoney(total)}</div>
              {items.length === 0 ? (
                <div className="gl-col-body gl-col-body--empty">
                  <div style={{ textAlign: "center", padding: "0 12px" }}>
                    <div style={{ opacity: 0.4, marginBottom: 8 }}><Icn d={ICONS.plus} size={20} /></div>
                    No deals here yet
                  </div>
                </div>
              ) : (
                <div className="gl-col-body">
                  {items.map(o => {
                    const acc = scenario.accounts.find(a => a.id === o.account_id);
                    return (
                      <div key={o.id} className="gl-deal-card" onClick={() => onOpenOpp(o.id)}>
                        <div className="gl-deal-title">{o.title}</div>
                        <div className="gl-deal-account">{acc?.name || "—"}</div>
                        <div className="gl-deal-foot">
                          <span className="gl-deal-value">{fmtMoney(o.value_cents)}</span>
                          {o.expected_close && <span style={{ fontSize: 11, color: "var(--gl-mute)" }}>{fmtDate(o.expected_close)}</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─────────── Reports ─────────── */
function Reports({ scenario, currentUser, isFounder }) {
  const won = scenario.opps.filter(o => o.stage === "won");
  const wonValue = won.reduce((a, o) => a + (o.value_cents || 0), 0);
  const opens = scenario.opps.filter(o => o.stage !== "won" && o.stage !== "lost");
  const pipeValue = opens.reduce((a, o) => a + (o.value_cents || 0), 0);

  const perRep = scenario.reps.map(r => {
    const repOpps = scenario.opps.filter(o => o.owner_id === r.id);
    const repWon = repOpps.filter(o => o.stage === "won");
    const repPipe = repOpps.filter(o => o.stage !== "won" && o.stage !== "lost");
    return {
      rep: r,
      won: repWon.reduce((a, o) => a + (o.value_cents || 0), 0),
      pipe: repPipe.reduce((a, o) => a + (o.value_cents || 0), 0),
      count: repOpps.length,
    };
  }).sort((a, b) => b.won - a.won);
  const maxWon = Math.max(1, ...perRep.map(r => r.won));

  return (
    <div className="gl-page" data-screen-label="Reports">
      <div className="gl-strip">
        <div><div className="gl-strip-label">Bookings · YTD</div><div className={"gl-strip-value" + (wonValue ? "" : " gl-strip-value--mute")}>{wonValue ? fmtMoney(wonValue) : "—"}</div></div>
        <div><div className="gl-strip-label">Open pipeline</div><div className={"gl-strip-value" + (pipeValue ? "" : " gl-strip-value--mute")}>{pipeValue ? fmtMoney(pipeValue) : "—"}</div></div>
        <div><div className="gl-strip-label">Deals won</div><div className={"gl-strip-value" + (won.length ? "" : " gl-strip-value--mute")}>{won.length || "—"}</div></div>
        <div><div className="gl-strip-label">Active reps</div><div className="gl-strip-value">{scenario.reps.length}</div></div>
      </div>

      <section className="gl-card">
        <div className="gl-card-head">
          <div>
            <div className="gl-card-eyebrow">{isFounder ? "All reps" : "You"}</div>
            <h2 className="gl-card-title">Bookings by rep</h2>
          </div>
        </div>
        {perRep.length === 0 || perRep.every(r => r.won === 0) ? (
          <div className="gl-empty" style={{ padding: "44px 20px" }}>
            <div className="gl-empty-icon"><Icn d={ICONS.reports} size={20} /></div>
            <p className="gl-empty-sub">Once deals are closed-won, performance lands here.</p>
          </div>
        ) : (
          <div className="gl-bars-vert">
            {(isFounder ? perRep : perRep.filter(r => r.rep.id === currentUser?.id)).map(r => (
              <div key={r.rep.id} className="gl-vbar">
                <div className="gl-vbar-head"><span>{r.rep.name}</span><span style={{ color: "var(--gl-mute)" }}>{fmtMoney(r.won)} · {r.count} deals</span></div>
                <div className="gl-vbar-track"><div className="gl-vbar-fill" style={{ width: (100 * r.won / maxWon) + "%" }} /></div>
              </div>
            ))}
          </div>
        )}
      </section>
    </div>
  );
}

/* ─────────── Outreach (Resend test send) ─────────── */
const TEMPLATES_KEY = "gl-templates-v1";
function loadTemplates() {
  try { return JSON.parse(localStorage.getItem(TEMPLATES_KEY) || "[]"); } catch { return []; }
}
function saveTemplates(list) {
  localStorage.setItem(TEMPLATES_KEY, JSON.stringify(list));
}

function TemplateModal({ open, onClose, template, onSaved }) {
  const editing = !!template;
  const [name, setName] = useState("");
  const [subject, setSubject] = useState("");
  const [body, setBody] = useState("");

  useEffect(() => {
    if (open) {
      setName(template?.name || "");
      setSubject(template?.subject || "");
      setBody(template?.body || "");
    }
  }, [open, template]);

  const submit = (e) => {
    e?.preventDefault?.();
    const list = loadTemplates();
    const now = new Date().toISOString();
    if (editing) {
      const idx = list.findIndex(t => t.id === template.id);
      if (idx >= 0) list[idx] = { ...list[idx], name, subject, body, updated_at: now };
    } else {
      list.unshift({ id: crypto.randomUUID(), name, subject, body, created_at: now, updated_at: now });
    }
    saveTemplates(list);
    showToast(editing ? "Template saved" : "Template created");
    onSaved();
    onClose();
  };

  return (
    <Modal open={open} onClose={onClose} title={editing ? "Edit template" : "New template"} sub="Templates are saved in this browser. Share via the Send screen."
      footer={
        <>
          <button className="gl-btn gl-btn--ghost" onClick={onClose}>Cancel</button>
          <button className="gl-btn gl-btn--primary" onClick={submit} disabled={!name.trim() || !subject.trim() || !body.trim()}>{editing ? "Save changes" : "Create template"}</button>
        </>
      }>
      <div className="gl-field"><label>Template name *</label><input className="gl-input" required value={name} onChange={(e) => setName(e.target.value)} autoFocus placeholder="e.g. Pay-By-Scan intro, Spring season check-in" /></div>
      <div className="gl-field"><label>Subject *</label><input className="gl-input" required value={subject} onChange={(e) => setSubject(e.target.value)} placeholder="e.g. Cutting Pay-By-Scan reconciliation time at {{operation}}" /></div>
      <div className="gl-field">
        <label>HTML body *</label>
        <textarea className="gl-input gl-input--textarea" rows="10" value={body} onChange={(e) => setBody(e.target.value)} placeholder={"<p>Hi {{first_name}},</p>\\n<p>Saw {{operation}} is shipping into [retailer] — wanted to share how growers your size are handling Pay-By-Scan reconciliation in GrowerLive.</p>"} />
      </div>
    </Modal>
  );
}

function SendTemplateModal({ open, onClose, template, currentUser, scenario }) {
  const [to, setTo] = useState("");
  const [from, setFrom] = useState("");
  const [subject, setSubject] = useState("");
  const [body, setBody] = useState("");
  const [contactId, setContactId] = useState("");
  const [sending, setSending] = useState(false);
  const [result, setResult] = useState(null);

  useEffect(() => {
    if (open && template) {
      setTo(currentUser?.email || "");
      setFrom("");
      setSubject(template.subject || "");
      setBody(template.body || "");
      setContactId("");
      setResult(null);
    }
  }, [open, template, currentUser]);

  // Merge field substitution: {{first_name}}, {{name}}, {{operation}}
  useEffect(() => {
    if (!contactId || !template) return;
    const c = scenario.contacts.find(x => x.id === contactId);
    if (!c) return;
    const acc = scenario.accounts.find(a => a.id === c.account_id);
    const merge = (s) => (s || "")
      .replace(/\{\{first_name\}\}/g, (c.name || "").split(/\s+/)[0])
      .replace(/\{\{name\}\}/g, c.name || "")
      .replace(/\{\{operation\}\}/g, acc?.name || "your operation")
      .replace(/\{\{title\}\}/g, c.title || "");
    setTo(c.email || currentUser?.email || "");
    setSubject(merge(template.subject));
    setBody(merge(template.body));
  }, [contactId, template, scenario, currentUser]);

  const send = async (e) => {
    e.preventDefault();
    setSending(true); setResult(null);
    try {
      const { data, error } = await sb.functions.invoke("send-campaign", {
        body: { to: to.trim(), subject: subject.trim(), html: body, from: from.trim() || undefined },
      });
      if (error) throw error;
      if (data?.error) throw new Error(data.error + (data.details ? " — " + JSON.stringify(data.details) : ""));
      setResult({ ok: true, id: data?.id });
      showToast("Email sent");
      // log to activities
      if (contactId) {
        await sb.from("activities").insert({
          type: "email", contact_id: contactId, subject: subject, summary: "Sent via GrowerLive Outreach",
          occurred_at: new Date().toISOString(), owner_id: currentUser?.id || null,
        });
      }
    } catch (err) {
      setResult({ ok: false, msg: err.message || String(err) });
      showToast(err.message || "Send failed", "err");
    } finally { setSending(false); }
  };

  if (!template) return null;
  return (
    <Modal open={open} onClose={onClose} title={"Send: " + template.name} sub="Pick a contact to auto-fill merge fields, or send to any address." width={620}
      footer={
        <>
          <button className="gl-btn gl-btn--ghost" onClick={onClose}>Cancel</button>
          <button className="gl-btn gl-btn--primary" onClick={send} disabled={sending || !to || !subject || !body}>{sending ? "Sending…" : "Send email"}</button>
        </>
      }>
      <div className="gl-field"><label>Contact <span style={{ color: "var(--gl-mute)", fontWeight: 400 }}>· optional, auto-fills merge fields</span></label>
        <select className="gl-input gl-input--select" value={contactId} onChange={(e) => setContactId(e.target.value)}>
          <option value="">— Send to a custom address —</option>
          {scenario.contacts.filter(c => c.email).map(c => {
            const acc = scenario.accounts.find(a => a.id === c.account_id);
            return <option key={c.id} value={c.id}>{c.name}{acc ? " · " + acc.name : ""}{c.email ? " (" + c.email + ")" : ""}</option>;
          })}
        </select>
      </div>
      <div className="gl-field-row">
        <div className="gl-field"><label>To *</label><input className="gl-input" type="email" required value={to} onChange={(e) => setTo(e.target.value)} /></div>
        <div className="gl-field"><label>From <span style={{ color: "var(--gl-mute)", fontWeight: 400 }}>· optional</span></label><input className="gl-input" value={from} onChange={(e) => setFrom(e.target.value)} placeholder="outreach@growerlive.com" /></div>
      </div>
      <div className="gl-field"><label>Subject *</label><input className="gl-input" required value={subject} onChange={(e) => setSubject(e.target.value)} /></div>
      <div className="gl-field"><label>HTML body *</label><textarea className="gl-input gl-input--textarea" rows="9" value={body} onChange={(e) => setBody(e.target.value)} /></div>
      {result && (
        <div className="gl-login-error" style={result.ok ? { background: "var(--gl-green-wash)", color: "var(--gl-green-deep)", borderColor: "#C6E2C2" } : {}}>
          {result.ok ? `Sent · message id ${result.id || "unknown"}` : `Failed · ${result.msg}`}
        </div>
      )}
    </Modal>
  );
}

function OutreachScreen({ currentUser, scenario }) {
  const [templates, setTemplates] = useState(() => loadTemplates());
  const [editingT, setEditingT] = useState(null);
  const [newOpen, setNewOpen] = useState(false);
  const [sendT, setSendT] = useState(null);

  const refresh = () => setTemplates(loadTemplates());

  const remove = (t) => {
    if (!confirm("Delete template '" + t.name + "'?")) return;
    saveTemplates(loadTemplates().filter(x => x.id !== t.id));
    refresh();
    showToast("Template deleted");
  };

  return (
    <div className="gl-page" data-screen-label="Outreach">
      <div className="gl-toolbar">
        <div>
          <div className="gl-card-eyebrow">Templates</div>
          <h2 className="gl-section-h" style={{ marginTop: 4 }}>Email templates</h2>
          <p className="gl-section-sub" style={{ marginTop: 4 }}>Write once, send to any grower or broker. Use <code style={{ background: "var(--gl-paper-2)", padding: "1px 5px", borderRadius: 3, fontFamily: "var(--gl-mono)", fontSize: 11 }}>{"{{first_name}}"}</code>, <code style={{ background: "var(--gl-paper-2)", padding: "1px 5px", borderRadius: 3, fontFamily: "var(--gl-mono)", fontSize: 11 }}>{"{{name}}"}</code>, <code style={{ background: "var(--gl-paper-2)", padding: "1px 5px", borderRadius: 3, fontFamily: "var(--gl-mono)", fontSize: 11 }}>{"{{operation}}"}</code> for merge fields.</p>
        </div>
        <div className="gl-toolbar-right">
          <button className="gl-btn gl-btn--primary" onClick={() => { setEditingT(null); setNewOpen(true); }}><Icn d={ICONS.plus} /> New template</button>
        </div>
      </div>

      {templates.length === 0 ? (
        <div className="gl-empty">
          <div className="gl-empty-icon"><Icn d={ICONS.outreach} size={20} /></div>
          <h3 className="gl-empty-title">No templates yet</h3>
          <p className="gl-empty-sub">Build templates for the conversations you have over and over — intro emails, post-demo follow-ups, season-opener check-ins, renewal nudges. Then send them in one click from any contact.</p>
          <div className="gl-empty-actions">
            <button className="gl-btn gl-btn--primary" onClick={() => { setEditingT(null); setNewOpen(true); }}><Icn d={ICONS.plus} /> Create your first template</button>
          </div>
        </div>
      ) : (
        <div className="gl-doc-grid">
          {templates.map(t => (
            <div key={t.id} className="gl-card" style={{ padding: 18, display: "flex", flexDirection: "column", gap: 8 }}>
              <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 8 }}>
                <div style={{ minWidth: 0, flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 500 }}>{t.name}</div>
                  <div style={{ fontSize: 12, color: "var(--gl-mute)", marginTop: 4, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.subject}</div>
                </div>
              </div>
              <div style={{ fontSize: 11.5, color: "var(--gl-mute-2)", marginTop: 4 }}>Updated {fmtRelative(t.updated_at)}</div>
              <div className="gl-divider" />
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                <button className="gl-btn gl-btn--primary" style={{ height: 30, padding: "4px 12px", fontSize: 12 }} onClick={() => setSendT(t)}><Icn d={ICONS.email} /> Send</button>
                <button className="gl-btn gl-btn--ghost" style={{ height: 30, padding: "4px 12px", fontSize: 12 }} onClick={() => { setEditingT(t); setNewOpen(true); }}>Edit</button>
                <button className="gl-btn gl-btn--danger" style={{ height: 30, padding: "4px 12px", fontSize: 12 }} onClick={() => remove(t)}>Delete</button>
              </div>
            </div>
          ))}
        </div>
      )}

      <TemplateModal open={newOpen} onClose={() => { setNewOpen(false); setEditingT(null); }} template={editingT} onSaved={refresh} />
      <SendTemplateModal open={!!sendT} onClose={() => setSendT(null)} template={sendT} currentUser={currentUser} scenario={scenario} />
    </div>
  );
}

/* ─────────── Stub screens (Quotes / Documents / Prospecting) ─────────── */
function StubScreen({ icon, title, blurb, todo }) {
  return (
    <div className="gl-page" data-screen-label={title}>
      <div className="gl-stub-screen">
        <div className="gl-empty-icon"><Icn d={ICONS[icon]} size={24} /></div>
        <h2 className="gl-card-title" style={{ fontSize: 28, marginTop: 14 }}>{title}</h2>
        <p className="gl-empty-sub" style={{ maxWidth: 480, margin: "10px auto 18px" }}>{blurb}</p>
        {todo && (
          <div style={{ maxWidth: 480, margin: "0 auto", textAlign: "left", padding: 22, background: "var(--gl-paper-2)", border: "1px solid var(--gl-line)", borderRadius: "var(--gl-r-lg)" }}>
            <div className="gl-card-eyebrow" style={{ marginBottom: 10 }}>Next up</div>
            <ul style={{ margin: 0, paddingLeft: 18, color: "var(--gl-mute)", fontSize: 13, lineHeight: 1.75 }}>
              {todo.map((t, i) => <li key={i}>{t}</li>)}
            </ul>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─────────── Main App ─────────── */
function App() {
  const [authState, setAuthState] = useState("checking");
  const [scenario, setScenario] = useState(null);
  const [dataErr, setDataErr] = useState(null);
  const [currentUser, setCurrentUser] = useState(null);

  const [view, setView] = useState("dashboard");
  const [search, setSearch] = useState("");
  const [contactId, setContactId] = useState(null);
  const [logOpen, setLogOpen] = useState(false);
  const [newOppOpen, setNewOppOpen] = useState(false);
  const [newOppPrefill, setNewOppPrefill] = useState(null);
  const [newContactOpen, setNewContactOpen] = useState(false);
  const [newAccountOpen, setNewAccountOpen] = useState(false);
  const [editAccount, setEditAccount] = useState(null);

  useEffect(() => {
    let alive = true;
    (async () => {
      const session = await getSession();
      if (!alive) return;
      setAuthState(session ? "signed-in" : "signed-out");
    })();
    const { data: sub } = sb.auth.onAuthStateChange((_e, session) => {
      setAuthState(session ? "signed-in" : "signed-out");
    });
    return () => { alive = false; sub?.subscription?.unsubscribe(); };
  }, []);

  const reload = useCallback(async () => {
    try {
      const d = await loadCRMData();
      setScenario(d);
      const session = await getSession();
      if (session && d.reps.length) {
        const me = d.reps.find(r => r.auth_user_id === session.user.id);
        if (me) { me.email = me.email || session.user.email; setCurrentUser(me); }
        else { setCurrentUser({ id: null, name: session.user.email, role: "Unlinked user", email: session.user.email }); }
      }
    } catch (e) { setDataErr(e.message); }
  }, []);

  useEffect(() => { if (authState === "signed-in") reload(); }, [authState, reload]);

  if (authState === "checking") return <><LoadingScreen message="Checking session…" /><ToastHost /></>;
  if (authState === "signed-out") return <><LoginScreen onAuthed={() => setAuthState("signed-in")} /><ToastHost /></>;
  if (dataErr) return (
    <div className="gl-loading">
      <div className="gl-loading-inner">
        <p style={{ color: "var(--gl-neg)", marginBottom: 12 }}>Error: {dataErr}</p>
        <button className="gl-btn gl-btn--ghost" onClick={reload}>Retry</button>
        <button className="gl-btn gl-btn--danger" onClick={signOut} style={{ marginLeft: 8 }}>Sign out</button>
      </div>
    </div>
  );
  if (!scenario) return <LoadingScreen message="Loading your CRM…" />;

  const FOUNDER_EMAILS = ["bwilliams@growerlive.com", "ryanw@growerlive.com"];
  const isFounder = currentUser && (
    (currentUser.role || "").toLowerCase().includes("founder") ||
    FOUNDER_EMAILS.includes((currentUser.email || "").toLowerCase())
  );

  const firstName = (currentUser?.name || "there").split(" ")[0];
  const titleMap = {
    dashboard: { title: `Good morning, ${firstName}`, bc: ["Workspace", "Dashboard"], primary: "New deal", onPrim: () => setNewOppOpen(true) },
    pipeline: { title: "Pipeline", bc: ["Workspace", "Pipeline"], primary: "New deal", onPrim: () => setNewOppOpen(true) },
    contacts: { title: "Contacts", bc: ["Workspace", "Contacts"], primary: "New contact", onPrim: () => setNewContactOpen(true) },
    accounts: { title: "Growers", bc: ["Workspace", "Growers"], primary: "New grower", onPrim: () => setNewAccountOpen(true) },
    activity: { title: "Activity", bc: ["Workspace", "Activity"], primary: "Log activity", onPrim: () => setLogOpen(true) },
    outreach: { title: "Outreach", bc: ["Growth", "Outreach"], primary: null },
    prospecting: { title: "Prospecting", bc: ["Growth", "Prospecting"], primary: null },
    quotes: { title: "Quotes", bc: ["Sales", "Quotes"], primary: null },
    documents: { title: "Sales documents", bc: ["Sales", "Documents"], primary: null },
    reports: { title: "Reports & Commission", bc: ["Sales", "Reports"], primary: null },
    "contact-detail": { title: "Contact", bc: ["Contacts", scenario.contacts.find(c => c.id === contactId)?.name || "Contact"], primary: null },
  };
  const t = titleMap[view] || titleMap.dashboard;

  const openContact = (id) => { setContactId(id); setView("contact-detail"); };

  return (
    <div className="gl-app">
      <Sidebar view={view === "contact-detail" ? "contacts" : view} setView={(v) => { setView(v); setContactId(null); }} currentUser={currentUser} onSignOut={signOut} />
      <main className="gl-main">
        <Topbar
          title={t.title}
          breadcrumb={t.bc}
          primaryLabel={t.primary}
          onPrimary={t.onPrim}
          onLogCall={() => setLogOpen(true)}
          search={search}
          setSearch={setSearch}
        />
        <div className="gl-content">
          {view === "dashboard" && <Dashboard scenario={scenario} currentUser={currentUser} onLogCall={() => setLogOpen(true)} onAddOpp={() => setNewOppOpen(true)} onOpenContact={openContact} />}
          {view === "pipeline" && <Pipeline scenario={scenario} onAddOpp={() => setNewOppOpen(true)} onOpenOpp={() => {}} search={search} />}
          {view === "contacts" && <Contacts scenario={scenario} onOpenContact={openContact} search={search} />}
          {view === "accounts" && <Accounts scenario={scenario} onEditAccount={setEditAccount} search={search} />}
          {view === "activity" && <ActivityScreen scenario={scenario} onOpenContact={openContact} onLogCall={() => setLogOpen(true)} />}
          {view === "reports" && <Reports scenario={scenario} currentUser={currentUser} isFounder={isFounder} />}
          {view === "outreach" && <OutreachScreen currentUser={currentUser} scenario={scenario} />}
          {view === "prospecting" && <StubScreen icon="prospecting" title="Prospecting"
            blurb="Build target lists of growers, brokers, and retail buyers — by operation type (greenhouse, nursery, sod), region, retailer relationships, or production volume — then push them straight into outreach campaigns."
            todo={null} />}
          {view === "quotes" && <StubScreen icon="quotes" title="Quotes"
            blurb="Build GrowerLive quotes — module mix (inventory, VMI, EDI, routing, SOD), seat counts, implementation, and training. Send a share link; track until accepted."
            todo={null} />}
          {view === "documents" && <StubScreen icon="documents" title="Documents"
            blurb="No documents yet. Upload contracts, proposals, and spec sheets — they'll link to the right account, deal, or contact."
            todo={null} />}
          {view === "contact-detail" && contactId && <ContactDetail scenario={scenario} contactId={contactId} onBack={() => { setContactId(null); setView("contacts"); }} onLogCall={() => setLogOpen(true)} onNewOpp={(cid) => { setNewOppPrefill(cid); setNewOppOpen(true); }} onSaved={reload} />}
        </div>
      </main>

      <NewAccountModal open={newAccountOpen} onClose={() => setNewAccountOpen(false)} currentUser={currentUser} onSaved={reload} />
      <NewAccountModal open={!!editAccount} onClose={() => setEditAccount(null)} account={editAccount} currentUser={currentUser} onSaved={reload} />
      <NewContactModal open={newContactOpen} onClose={() => setNewContactOpen(false)} scenario={scenario} currentUser={currentUser} onSaved={reload} />
      <NewOppModal open={newOppOpen} onClose={() => { setNewOppOpen(false); setNewOppPrefill(null); }} scenario={scenario} currentUser={currentUser} onSaved={reload} prefillContactId={newOppPrefill} />
      <LogCallModal open={logOpen} onClose={() => setLogOpen(false)} scenario={scenario} currentUser={currentUser} onSaved={reload} />
      <ToastHost />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
